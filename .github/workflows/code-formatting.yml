name: Format Check

# Verifies that all committed code is formatted with oxfmt using the same
# .oxfmtrc.json the local pre-commit hook uses. This is the CI guard (Part B):
# it does not modify code, it fails the check if anything is unformatted so an
# unformatted PR cannot merge. The local pre-commit hook (lint-staged + oxfmt
# --write) is what actually formats changed files before they are pushed.
on:
  pull_request:
  push:
    branches:
      - main
      - migrate-to-convex

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting with oxfmt
        run: bunx oxfmt --check .
